on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json

  # Dispatch publish.yml as the entry workflow (not via workflow_call) so npm's
  # trusted-publisher OIDC check sees publish.yml as the workflow_ref claim.
  # Calling it as a reusable workflow shifts that claim to release.yaml, which
  # the trusted publisher rule on npmjs.com is not bound to. workflow_dispatch
  # is one of the GITHUB_TOKEN-trigger exceptions, so this also sidesteps the
  # downstream-event suppression that broke the original `release: published`
  # path under the L-1 mitigation.
  dispatch-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger publish workflow on the release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh workflow run publish.yml --ref "$TAG" -R "$GITHUB_REPOSITORY"
