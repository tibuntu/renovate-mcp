name: Publish to npm

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        description: Git ref (typically the release tag) to check out and publish.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance via OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm

      # npm >= 11.5.1 is required for Trusted Publishers (OIDC) auth.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      # Smoke-test the would-be-published tarball: pack it, install globally,
      # and verify the resulting `renovate-mcp` binary answers an MCP
      # `initialize` request. Catches `files`/`bin`/shebang/startup regressions
      # that the in-tree tests miss because they read from the working tree.
      - run: npm pack
      - run: npm install -g ./renovate-mcp-*.tgz
      - run: node scripts/smoke-test-tarball.mjs

      - run: npm publish
