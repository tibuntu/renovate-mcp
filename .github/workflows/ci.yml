name: CI

# NOTE: This workflow deliberately does NOT install the `renovate` CLI.
# The `validate_config` and `dry_run` tools shell out to Renovate (see
# src/lib/renovateCli.ts) and therefore are NOT exercised end-to-end here.
# Integration tests for those paths use fake binaries via
# RENOVATE_BIN / RENOVATE_CONFIG_VALIDATOR_BIN instead (see
# test/helpers/mcpSession.ts). Rationale and the broader design decision
# live in CLAUDE.md ("Integration tests use stdio + fake binaries").
# If you add a job that does install Renovate, update CLAUDE.md too.

on:
  push:
    branches: [main]
  pull_request:
    # Skip PRs that only touch docs / non-build files. NOTE: `build-test` is
    # a required status check on `main` (ruleset "main: required CI checks"),
    # so a doc-only PR whose workflow is skipped here will be blocked from
    # merging — unblock via admin (edit/disable the ruleset) or by adjusting
    # this list. Push to `main` stays unfiltered as a post-merge sanity run.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/claude.yml'
      - '.github/workflows/dependency-review.yml'
      - '.github/workflows/publish.yml'
      - '.github/workflows/release.yaml'

# Least-privilege default for the GITHUB_TOKEN. `actions/checkout` only
# needs `contents: read`; nothing in this workflow writes back to the repo
# or interacts with PRs/issues.
permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Catch drift between package.json and the snapshot in package-lock.json.
      # `npm ci` validates the dependency tree but ignores root metadata fields
      # like `os`, `engines`, and `bin`, so a hand-edit of package.json without
      # `npm install` slips through. The lock file is platform-agnostic, so we
      # only run this on one OS in the matrix.
      - name: Verify package-lock.json is in sync with package.json
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm install --package-lock-only --no-audit --no-fund
          git diff --exit-code package-lock.json

      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:coverage

      - name: Upload coverage report
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
